<!DOCTYPE html>
<html>
<head>
    <title>Mock Draft Log</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        .fantasy-table { width: 100%; border-collapse: collapse; }
        .fantasy-table th, .fantasy-table td { border: 1px solid #ccc; padding: 8px; }
        .pos-sp { color: red; }
        .status-badge { padding: 4px; border-radius: 4px; color: white; }
        .status-DRAFTING { background-color: blue; }
        .tab-content-area { padding: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <select id="gameSelector">
            <option value="">Loading Games...</option>
        </select>

        <div class="tabs-header">
            <button class="tab-btn active" id="draft-tab" onclick="switchTab('draft')">DRAFT LOG</button>
            <button class="tab-btn" id="transaction-tab" onclick="switchTab('transaction')">TRANSACTION LOG</button>
        </div>

        <div id="draft-content" class="tab-content-area">
            <h2>Draft Picks</h2>
            <table class="fantasy-table">
                <thead>
                <tr>
                    <th>#</th>
                    <th>Player</th>
                    <th>Team</th>
                    <th>Position</th>
                    <th>Picked By</th>
                    <th>Time</th>
                </tr>
                </thead>
                <tbody id="draftLogBody">
                </tbody>
            </table>
        </div>

        <div id="transaction-content" class="tab-content-area" style="display:none;">
            <h2>Transaction History</h2>
            <table class="fantasy-table">
                <tbody id="logBody"></tbody>
            </table>
        </div>
    </div>

    <script>
        const currentUserId = 1;
        let currentTab = 'draft';

        $(document).ready(function() {
            loadMyGames();

            $('#gameSelector').change(function() {
                const seq = $(this).val();
                if(seq) reloadCurrentTab();
            });
        });

        function switchTab(tabName) {
            currentTab = tabName;
            $('.tab-btn').removeClass('active');
            $('#' + tabName + '-tab').addClass('active');

            if (tabName === 'draft') {
                $('#draft-content').show();
                $('#transaction-content').hide();
            } else {
                $('#draft-content').hide();
                $('#transaction-content').show();
            }

            reloadCurrentTab();
        }

        function reloadCurrentTab() {
            const seq = $('#gameSelector').val();
            if (seq) {
                if (currentTab === 'draft') {
                    loadDraftLog(seq);
                } else {
                    loadTransactionLogs(seq);
                }
            }
        }

        function loadMyGames() {
            $.get('/apis/v1/fantasy/my-games?userId=' + currentUserId, function(games) {
                const select = $('#gameSelector');
                select.empty();
                if (games.length === 0) {
                    select.append('<option value="">No Games</option>');
                    return;
                }
                games.sort((a, b) => b.seq - a.seq);
                games.forEach(g => {
                    select.append(`<option value="${g.seq}">${g.title}</option>`);
                });
                select.val(games[0].seq);
                reloadCurrentTab();
            }).fail(function() {
                 $('#gameSelector').html('<option value="">Error loading games</option>');
            });
        }

        function loadDraftLog(seq) {
            const tbody = $('#draftLogBody');
            tbody.empty();
            tbody.append('<tr><td colspan="6">Loading...</td></tr>');

            $.get(`/apis/v1/fantasy/games/${seq}/logs?type=DRAFT`, function(logs) {
                tbody.empty();
                if (logs.length === 0) {
                    tbody.append('<tr><td colspan="6">No picks yet.</td></tr>');
                    return;
                }

                logs.forEach(log => {
                    const firstPos = log.playerPosition ? log.playerPosition.split(',')[0].trim().toLowerCase() : '';
                    const posClass = 'pos-' + firstPos;

                    let timeStr = '';
                    if (log.timestamp) {
                        let dateStr = log.timestamp;
                        if (!dateStr.endsWith('Z') && !dateStr.includes('+')) {
                            dateStr += 'Z';
                        }
                        timeStr = new Date(dateStr).toLocaleString();
                    }

                    const row = `
                        <tr>
                            <td>${log.seq}</td>
                            <td>${log.playerName || ''}</td>
                            <td>${log.playerTeam || ''}</td>
                            <td><span class="${posClass}" style="font-weight:bold;">${log.playerPosition || ''}</span></td>
                            <td>${log.participantName || ''}</td>
                            <td>${timeStr}</td>
                        </tr>
                    `;
                    tbody.append(row);
                });
            });
        }

        function loadTransactionLogs(seq) {
            // omitted for brevity as we test draft log
        }
    </script>
</body>
</html>
