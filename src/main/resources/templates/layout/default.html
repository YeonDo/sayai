<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title layout:title-pattern="$CONTENT_TITLE">Sayai Record</title>

    <!-- Favicon -->
    <link rel="icon" type="image/png" th:href="@{/favicon.png}">

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json">

    <!-- iOS PWA Meta Tags -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Sayai Record">
    <meta name="theme-color" content="#007bff">
    <link rel="apple-touch-icon" th:href="@{/favicon.png}">

    <!-- Common CSS -->
    <link rel="stylesheet" th:href="@{/css/style.css}">

    <!-- Common JS -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script th:src="@{/js/auth.js}"></script>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.2.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.2.0/firebase-messaging-compat.js"></script>
    <script th:src="@{/js/fcm.js}"></script>
</head>
<body>
    <!-- Global Navigation Bar -->
    <th:block th:replace="fragments/gnb :: #gnb"></th:block>

    <!-- Main Content Area -->
    <div layout:fragment="content">
        <!-- Content injected here -->
    </div>

    <!-- Login Modal -->
    <th:block th:replace="fragments/login-modal :: #login-modal"></th:block>

    <!-- Custom FCM Alert -->
    <div id="custom-fcm-alert" class="custom-alert" style="display: none;">
        <div class="custom-alert-content">
            <span class="custom-alert-close">&times;</span>
            <h4 id="custom-alert-title"></h4>
            <p id="custom-alert-body"></p>
        </div>
    </div>

    <!-- iOS 홈화면 추가 유도 배너 -->
    <div id="ios-install-prompt" style="display: none;">
        <div class="ios-install-content">
            <button class="ios-install-close" aria-label="닫기">&times;</button>
            <div class="ios-install-body">
                <p class="ios-install-title">알림을 받으려면 홈화면에 추가하세요</p>
                <p class="ios-install-desc">Safari 하단 <strong>공유 버튼(&#x2b06;)</strong>을 탭한 후 <strong>"홈 화면에 추가"</strong>를 선택하세요.</p>
            </div>
        </div>
    </div>

    <!-- FCM 알림 권한 요청 배너 -->
    <div id="fcm-permission-banner" style="display: none;">
        <div class="fcm-permission-content">
            <p class="fcm-permission-text">경기 알림을 받으시겠습니까?</p>
            <div class="fcm-permission-actions">
                <button id="fcm-allow-btn">허용</button>
                <button id="fcm-deny-btn">나중에</button>
            </div>
        </div>
    </div>
</body>
</html>
