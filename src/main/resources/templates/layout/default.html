<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title layout:title-pattern="$CONTENT_TITLE">Sayai Record</title>

    <!-- Favicon -->
    <link rel="icon" type="image/png" th:href="@{/favicon.png}">

    <!-- Common CSS -->
    <link rel="stylesheet" th:href="@{/css/style.css}">

    <!-- Common JS -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script th:src="@{/js/auth.js}"></script>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.2.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.2.0/firebase-messaging-compat.js"></script>
    <script th:src="@{/js/fcm.js}"></script>
</head>
<body>
    <!-- Global Navigation Bar -->
    <th:block th:replace="fragments/gnb :: #gnb"></th:block>

    <!-- Main Content Area -->
    <div layout:fragment="content">
        <!-- Content injected here -->
    </div>

    <!-- Login Modal -->
    <th:block th:replace="fragments/login-modal :: #login-modal"></th:block>

    <!-- Custom FCM Alert -->
    <div id="custom-fcm-alert" class="custom-alert" style="display: none;">
        <div class="custom-alert-content">
            <span class="custom-alert-close">&times;</span>
            <h4 id="custom-alert-title"></h4>
            <p id="custom-alert-body"></p>
        </div>
    </div>
</body>
</html>
